<!DOCTYPE html>
<html dir="rtl"> 
<head>
    <title>شركة التصدير</title>
    <style>
        body {
            background-color: #f4f4f9;
            color: #333333;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            color: #2c3e50;
        }
        /* تنسيق جديد للصورة لتبدو احترافية */
        img {
            width: 300px; /* تحديد عرض الصورة */
            border-radius: 10px; /* تدوير حواف الصورة */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* إضافة ظل خفيف */
            margin-bottom: 20px;
        }
        button {
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>الجوشي للتجارة والتصدير</h1>
    
    <img src="product.jpg" alt="صورة المحاصيل">

    <p>نقدم أفضل المحاصيل الزراعية والمنتجات للتصدير الدولي.</p>
    
    <button>تواصل معنا</button>

</body>
</html>
