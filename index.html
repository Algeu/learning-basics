<!DOCTYPE html>
<html dir="rtl"> 
<head>
    <title>شركة التصدير</title>
    <style>
        body {
            background-color: #f4f4f9; /* لون خلفية رمادي فاتح مريح للعين */
            color: #333333; /* لون نص داكن */
            font-family: Arial, sans-serif; /* تغيير نوع الخط */
            text-align: center; /* توسيط الكلام في منتصف الصفحة */
            margin-top: 50px;
        }
        h1 {
            color: #2c3e50; /* لون أزرق داكن للعنوان */
        }
        button {
            background-color: #27ae60; /* زر بلون أخضر يعبر عن الزراعة والتصدير */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px; /* تدوير حواف الزر */
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>الجوشي للتجارة والتصدير</h1>
    <p>نقدم أفضل المحاصيل الزراعية والمنتجات للتصدير الدولي.</p>
    
    <button>تواصل معنا</button>

</body>
</html>
